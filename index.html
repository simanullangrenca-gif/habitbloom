<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- Meta tag viewport di bawah ini WAJIB ada agar ukuran web otomatis pas dengan layar HP -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitBloom - Rawat Kebiasaanmu</title>
    <!-- Menggunakan Tailwind CSS via CDN untuk kemudahan desain responsive -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-stone-100 text-stone-800 font-sans antialiased">

    <!-- CONTAINER UTAMA: Dibatasi maksimal seukuran layar HP (max-w-md) agar rapi saat dibuka di laptop maupun HP -->
    <div class="max-w-md mx-auto min-h-screen bg-white shadow-xl flex flex-col justify-between">
        
        <!-- 1. HEADER / BAGIAN ATAS -->
        <header class="p-4 border-b border-stone-200 bg-emerald-600 text-white flex justify-between items-center sticky top-0 z-10">
            <h1 class="text-xl font-bold tracking-wide">🌱 HabitBloom</h1>
            <!-- Info Koin / Status -->
            <div class="flex items-center space-x-2 bg-emerald-700 px-3 py-1 rounded-full text-sm">
                <span>🪙</span>
                <span id="coin-count" class="font-semibold">120</span>
            </div>
        </header>

        <!-- 2. KONTEN UTAMA (Bisa di-scroll jika panjang) -->
        <main class="flex-1 p-4 space-y-6 overflow-y-auto">
            
            <!-- Area Tanaman / Progress Utama -->
            <div class="bg-stone-50 border border-stone-200 rounded-2xl p-6 text-center space-y-3">
                <div class="text-6xl animate-bounce my-4">🪴</div>
                <h2 class="text-lg font-bold">Tanaman Kebiasaanmu</h2>
                <p class="text-xs text-stone-500">Selesaikan tugas harian untuk menyiram dan menumbuhkan tanamanmu!</p>
                <!-- Progress Bar -->
                <div class="w-full bg-stone-200 rounded-full h-2.5 dark:bg-stone-700 mt-2">
                    <div class="bg-emerald-500 h-2.5 rounded-full" style="width: 45%"></div>
                </div>
                <span class="text-xs font-medium text-emerald-600">Level 2 (45%)</span>
            </div>

            <!-- Daftar Kebiasaan (Habit List) -->
            <div class="space-y-3">
                <h3 class="text-sm font-semibold text-stone-500 uppercase tracking-wider">Tugas Hari Ini</h3>
                
                <!-- Item Kebiasaan 1 -->
                <div class="flex items-center justify-between p-4 bg-white border border-stone-200 rounded-xl hover:border-emerald-500 transition">
                    <div class="flex items-center space-x-3">
                        <span class="text-2xl">📚</span>
                        <div>
                            <p class="font-medium text-sm">Belajar Coding 30 Menit</p>
                            <p class="text-xs text-stone-400">Harian • Pagi</p>
                        </div>
                    </div>
                    <button class="bg-emerald-100 hover:bg-emerald-500 hover:text-white text-emerald-700 rounded-lg p-2 text-xs font-bold transition">
                        Selesai
                    </button>
                </div>

                <!-- Item Kebiasaan 2 -->
                <div class="flex items-center justify-between p-4 bg-white border border-stone-200 rounded-xl hover:border-emerald-500 transition">
                    <div class="flex items-center space-x-3">
                        <span class="text-2xl">💧</span>
                        <div>
                            <p class="font-medium text-sm">Minum Air Putih 2L</p>
                            <p class="text-xs text-stone-400">Harian • Seharian</p>
                        </div>
                    </div>
                    <button class="bg-emerald-100 hover:bg-emerald-500 hover:text-white text-emerald-700 rounded-lg p-2 text-xs font-bold transition">
                        Selesai
                    </button>
                </div>
            </div>

        </main>

        <!-- 3. NAVIGATION BAR / MENU BAWAH (Khas Aplikasi HP) -->
        <nav class="border-t border-stone-200 bg-white p-2 flex justify-around items-center sticky bottom-0">
            <button class="flex flex-col items-center space-y-1 text-emerald-600 font-medium">
                <span class="text-xl">🏡</span>
                <span class="text-xs">Utama</span>
            </button>
            <button class="flex flex-col items-center space-y-1 text-stone-400 hover:text-emerald-600">
                <span class="text-xl">📊</span>
                <span class="text-xs">Statistik</span>
            </button>
            <button class="flex flex-col items-center space-y-1 text-stone-400 hover:text-emerald-600">
                <span class="text-xl">🛒</span>
                <span class="text-xs">Toko</span>
            </button>
        </nav>

    </div>

</body>
</html>
